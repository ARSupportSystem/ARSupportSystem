<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AR.js Marker Scene</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #hud {
        position: fixed;
        z-index: 10;
        top: 0.6rem;
        left: 0.6rem;
        right: 0.6rem;
        pointer-events: none;
        font-size: 12px;
        color: #f5f5f5;
      }

      #hud > div {
        display: inline-block;
        padding: 0.4rem 0.55rem;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.45);
      }

      .a-enter-vr,
      .a-enter-ar {
        display: none !important;
      }
    </style>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <div id="hud"><div id="status">Initializing AR.js camera…</div></div>

    <a-scene
      embedded
      renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <a-marker preset="hiro" id="marker-hiro">
        <a-box position="0 0.5 0" material="color: #00ffff; opacity: 0.35" depth="0.8" height="0.8" width="0.8"></a-box>
        <a-text value="HIRO" align="center" position="0 1.1 0" color="#00ffff" scale="1.2 1.2 1.2"></a-text>
      </a-marker>

      <a-marker preset="kanji" id="marker-kanji">
        <a-box position="0 0.5 0" material="color: #ff8800; opacity: 0.35" depth="0.8" height="0.8" width="0.8"></a-box>
        <a-text value="FLT-002" align="center" position="0 1.1 0" color="#ff8800" scale="1.1 1.1 1.1"></a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById('status');

      const sendStatus = (message) => {
        statusElement.textContent = message;
        window.parent.postMessage({ type: 'arjs-status', message }, window.location.origin);
      };

      const notifyMarker = (type, marker) => {
        window.parent.postMessage({ type, marker }, window.location.origin);
      };

      const notifyCameraLive = () => {
        window.parent.postMessage({ type: 'arjs-camera-live' }, window.location.origin);
      };

      const notifyCameraError = (message) => {
        window.parent.postMessage({ type: 'arjs-camera-error', message }, window.location.origin);
      };

      window.addEventListener('load', () => {
        sendStatus('AR.js initializing...');

        const hiro = document.getElementById('marker-hiro');
        const kanji = document.getElementById('marker-kanji');

        if (hiro) {
          hiro.addEventListener('markerFound', () => {
            sendStatus('Hiro marker found.');
            notifyMarker('arjs-marker-found', 'hiro');
          });

          hiro.addEventListener('markerLost', () => {
            sendStatus('Hiro marker lost.');
            notifyMarker('arjs-marker-lost', 'hiro');
          });
        }

        if (kanji) {
          kanji.addEventListener('markerFound', () => {
            sendStatus('Kanji marker found.');
            notifyMarker('arjs-marker-found', 'kanji');
          });

          kanji.addEventListener('markerLost', () => {
            sendStatus('Kanji marker lost.');
            notifyMarker('arjs-marker-lost', 'kanji');
          });
        }

        const cameraBootstrapTimeout = window.setTimeout(() => {
          sendStatus('Camera not detected yet. Waiting for permission/stream...');
        }, 2500);

        const cameraFailTimeout = window.setTimeout(() => {
          sendStatus('Camera stream did not start.');
          notifyCameraError('Camera stream did not start. Check browser camera permission.');
        }, 7000);

        const monitorCameraVideo = () => {
          const streamVideo = document.querySelector('video');

          if (!streamVideo) {
            window.requestAnimationFrame(monitorCameraVideo);
            return;
          }

          const onCameraReady = () => {
            window.clearTimeout(cameraBootstrapTimeout);
            window.clearTimeout(cameraFailTimeout);
            sendStatus('AR.js ready. Point camera at Hiro or Kanji marker.');
            notifyCameraLive();
            streamVideo.removeEventListener('playing', onCameraReady);
          };

          if (streamVideo.readyState >= 2 && !streamVideo.paused) {
            onCameraReady();
            return;
          }

          streamVideo.addEventListener('playing', onCameraReady, { once: true });
        };

        monitorCameraVideo();
      });
    </script>
  </body>
</html>
