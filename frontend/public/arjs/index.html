
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR.js Marker Scene</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <div id="hud">
      <div id="status">AR.js loading...</div>
      <div id="faultDetails"></div>
    </div>
    <div id="toolbar"><button id="backBtn" type="button">Back</button></div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    >
      <a-marker preset="hiro" id="marker-hiro">
        <a-box position="0 0.5 0" material="color: #00ffff; opacity: 0.5" depth="1" height="1" width="1"></a-box>
        <a-text value="HIRO" align="center" position="0 1.2 0" color="#00ffff" scale="1.5 1.5 1.5"></a-text>
      </a-marker>

      <a-marker preset="kanji" id="marker-kanji">
        <a-box position="0 0.5 0" material="color: #ff8800; opacity: 0.5" depth="1" height="1" width="1"></a-box>
        <a-text value="KANJI" align="center" position="0 1.2 0" color="#ff8800" scale="1.5 1.5 1.5"></a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    <script src="./app.js"></script>
  </body>
</html>
