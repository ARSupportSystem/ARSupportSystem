<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR.js Marker Scene</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #hud {
        position: fixed;
        z-index: 1000;
        top: 10px;
        left: 10px;
        right: 10px;
        pointer-events: none;
        font-family: sans-serif;
        color: white;
      }
      #hud > div {
        background: rgba(0, 0, 0, 0.6);
        padding: 8px;
        border-radius: 4px;
        display: inline-block;
      }
      #toolbar {
        position: fixed;
        z-index: 1000;
        right: 10px;
        top: 10px;
      }
      #backBtn {
        padding: 8px 16px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: 1px solid white;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <div id="hud"><div id="status">AR.js loading...</div></div>
    <div id="toolbar"><button id="backBtn" type="button">Back</button></div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    >
      <a-marker preset="hiro" id="marker-hiro">
        <a-box position="0 0.5 0" material="color: #00ffff; opacity: 0.5" depth="1" height="1" width="1"></a-box>
        <a-text value="HIRO" align="center" position="0 1.2 0" color="#00ffff" scale="1.5 1.5 1.5"></a-text>
      </a-marker>

      <a-marker preset="kanji" id="marker-kanji">
        <a-box position="0 0.5 0" material="color: #ff8800; opacity: 0.5" depth="1" height="1" width="1"></a-box>
        <a-text value="KANJI" align="center" position="0 1.2 0" color="#ff8800" scale="1.5 1.5 1.5"></a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const statusElement = document.getElementById('status');
      const mode = new URLSearchParams(window.location.search).get('mode') || 'faults';
      const modeText = mode === 'tools' ? 'Tools mode' : 'Faults mode';

      const sendStatus = (message) => {
        statusElement.textContent = message;
        window.parent.postMessage({ type: 'arjs-status', message }, window.location.origin);
      };

      const notifyMarker = (type, marker) => {
        window.parent.postMessage({ type, marker }, window.location.origin);
      };

      const notifyCameraLive = () => {
        window.parent.postMessage({ type: 'arjs-camera-live' }, window.location.origin);
      };

      const notifyCameraError = (message) => {
        window.parent.postMessage({ type: 'arjs-camera-error', message }, window.location.origin);
      };

      window.addEventListener('load', () => {
        sendStatus(`AR.js initializing (${modeText})...`);

        const backButton = document.getElementById('backBtn');
        if (backButton) {
          backButton.addEventListener('click', () => {
            window.history.back();
          });
        }

        const hiro = document.getElementById('marker-hiro');
        const kanji = document.getElementById('marker-kanji');

        if (hiro) {
          hiro.addEventListener('markerFound', () => {
            sendStatus('Hiro marker found.');
            notifyMarker('arjs-marker-found', 'hiro');
          });

          hiro.addEventListener('markerLost', () => {
            sendStatus('Hiro marker lost.');
            notifyMarker('arjs-marker-lost', 'hiro');
          });
        }

        if (kanji) {
          kanji.addEventListener('markerFound', () => {
            sendStatus('Kanji marker found.');
            notifyMarker('arjs-marker-found', 'kanji');
          });

          kanji.addEventListener('markerLost', () => {
            sendStatus('Kanji marker lost.');
            notifyMarker('arjs-marker-lost', 'kanji');
          });
        }

        const cameraBootstrapTimeout = window.setTimeout(() => {
          sendStatus('Camera not detected yet. Waiting for permission/stream...');
        }, 2500);

        const cameraFailTimeout = window.setTimeout(() => {
          sendStatus('Camera stream did not start.');
          notifyCameraError('Camera stream did not start. Check browser camera permission.');
        }, 7000);

        const monitorCameraVideo = () => {
          const streamVideo = document.querySelector('video');

          if (!streamVideo) {
            window.requestAnimationFrame(monitorCameraVideo);
            return;
          }

          const onCameraReady = () => {
            window.clearTimeout(cameraBootstrapTimeout);
            window.clearTimeout(cameraFailTimeout);
            sendStatus(`AR.js ready (${modeText}). Point camera at Hiro or Kanji marker.`);
            notifyCameraLive();

            streamVideo.addEventListener('pause', () => {
              sendStatus('Camera stream paused unexpectedly.');
              notifyCameraError('Camera stream paused unexpectedly. Re-open AR camera.');
            });

            streamVideo.addEventListener('ended', () => {
              sendStatus('Camera stream ended unexpectedly.');
              notifyCameraError('Camera stream ended unexpectedly. Re-open AR camera.');
            });

            streamVideo.removeEventListener('playing', onCameraReady);
          };

          if (streamVideo.readyState >= 2 && !streamVideo.paused) {
            onCameraReady();
            return;
          }

          streamVideo.addEventListener('playing', onCameraReady, { once: true });
        };

        monitorCameraVideo();
      });
    </script>
  </body>
</html>
